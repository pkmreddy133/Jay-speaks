<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jay Speaks" />
  <title>Jay Speaks</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #1a2d40; font-family: 'Nunito', sans-serif; overflow-x: hidden; }
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes bob { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }
    @keyframes glow { 0%,100% { box-shadow:0 0 14px #FF8C0050; } 50% { box-shadow:0 0 28px #FF8C0090; } }

    /* NAV */
    #nav {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 16px 14px; flex-shrink: 0;
      transition: background 0.3s;
      background: #1a2d40;
    }
    #logo-box {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, #FFB432, #FF7A00);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; animation: glow 3s ease infinite;
      font-family: 'Baloo 2', cursive; font-size: 26px; font-weight: 800; color: #fff;
    }
    .nav-btn {
      width: 48px; height: 48px; border-radius: 14px;
      background: rgba(255,255,255,.22); border: none;
      color: #fff; font-size: 22px; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #nav-mid { flex: 1; padding-left: 4px; }
    #nav-title { font-family: 'Baloo 2', cursive; font-size: 22px; font-weight: 800; color: #fff; }

    /* PAGES */
    .page {
      flex: 1; padding: 12px 16px 36px;
      display: flex; flex-direction: column; gap: 12px;
      animation: fadeUp .25s ease both;
    }
    .page-hint {
      font-size: 15px; font-weight: 700;
      color: rgba(255,255,255,.45); text-align: center; margin-bottom: 2px;
    }
    .grid2 {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; flex: 1;
    }

    /* TILES */
    .tile {
      border-radius: 22px; border: none;
      padding: 22px 10px 16px;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      min-height: 140px; cursor: pointer;
      transition: transform .1s; color: #fff;
    }
    .tile:active { transform: scale(0.96); }
    .tile-emoji { font-size: 52px; line-height: 1; filter: drop-shadow(0 3px 6px rgba(0,0,0,.3)); }
    .tile-word {
      font-size: 17px; font-weight: 900; color: #fff;
      text-align: center; text-shadow: 0 2px 5px rgba(0,0,0,.3);
      line-height: 1.2;
    }

    /* SPEAK PAGE */
    #speak-page {
      flex: 1; padding: 28px 24px 52px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px;
      animation: fadeUp .25s ease both;
    }
    #speak-emoji-box {
      width: 190px; height: 190px; border-radius: 36px;
      background: rgba(255,255,255,.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 100px; line-height: 1;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.3));
    }
    #speak-emoji-box.pulsing { animation: bob .85s ease infinite; }
    #phrase-card {
      background: rgba(255,255,255,.18); border-radius: 22px;
      padding: 20px 24px; text-align: center;
      width: 100%; max-width: 340px;
    }
    #sound-icon { font-size: 30px; margin-bottom: 6px; display: none; }
    #phrase-text { font-size: 24px; font-weight: 900; color: #fff; line-height: 1.4; }
    #say-again-btn {
      width: 100%; max-width: 340px; padding: 22px;
      border-radius: 22px; border: none;
      background: rgba(255,255,255,.25); color: #fff;
      font-family: 'Nunito', sans-serif; font-size: 21px; font-weight: 800;
      cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,.25);
    }
    #say-again-btn:active { transform: scale(0.97); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app">

  <!-- NAV -->
  <div id="nav">
    <div id="logo-box">J</div>
    <button class="nav-btn hidden" id="back-btn" onclick="goBack()">←</button>
    <div id="nav-mid">
      <span id="nav-title">Jay Speaks</span>
    </div>
    <button class="nav-btn hidden" id="x-btn" onclick="goHome()">✕</button>
  </div>

  <!-- HOME -->
  <div class="page" id="home-page">
    <div class="page-hint">What do you want?</div>
    <div class="grid2" id="home-grid"></div>
  </div>

  <!-- GROUP -->
  <div class="page hidden" id="group-page">
    <div class="page-hint">Tap what you want to say</div>
    <div class="grid2" id="group-grid"></div>
  </div>

  <!-- SPEAK -->
  <div id="speak-page" class="hidden">
    <div id="speak-emoji-box"></div>
    <div id="phrase-card">
      <div id="sound-icon">🔊</div>
      <div id="phrase-text"></div>
    </div>
    <button id="say-again-btn" onclick="sayAgain()">🔊 &nbsp;Say it again</button>
  </div>

</div>

<script>
const GROUPS = [
  {
    id:"food", label:"Food", emoji:"🍽️", bg:"#FF6B35",
    items:[
      {label:"Hungry",    phrase:"I am hungry",             emoji:"🤤", bg:"#E55A28"},
      {label:"Lunch",     phrase:"I want lunch please",      emoji:"🥪", bg:"#D44F1F"},
      {label:"Dinner",    phrase:"I want dinner please",    emoji:"🍛", bg:"#D44F1F"},
      {label:"Chips",     phrase:"I want chips please",     emoji:"🥔", bg:"#FF7A42"},
      {label:"Cookies",   phrase:"I want cookies please",   emoji:"🍪", bg:"#E56030"},
      {label:"Breakfast", phrase:"I want breakfast please", emoji:"🥞", bg:"#FF8C5A"},
    ]
  },
  {
    id:"feelings", label:"Feelings", emoji:"💭", bg:"#7B5EA7",
    items:[
      {label:"Happy",      phrase:"I am happy",      emoji:"😄", bg:"#6A4D96"},
      {label:"Angry",      phrase:"I am angry",      emoji:"😡", bg:"#C0392B"},
      {label:"Sad",        phrase:"I am sad",        emoji:"😢", bg:"#2980B9"},
      {label:"Frustrated", phrase:"I am frustrated", emoji:"😤", bg:"#E67E22"},
      {label:"Sleepy",     phrase:"I am sleepy",     emoji:"😴", bg:"#5D6D7E"},
    ]
  },
  {
    id:"bathroom", label:"Bathroom", emoji:"🚿", bg:"#17A589",
    items:[
      {label:"Bathroom",   phrase:"I need to go to the bathroom", emoji:"🚽", bg:"#148F77"},
      {label:"Shower",     phrase:"I want to take a shower",      emoji:"🚿", bg:"#17A589"},
      {label:"Brush",      phrase:"I need to brush my teeth",     emoji:"🪥", bg:"#1ABC9C"},
      {label:"Wash Hands", phrase:"I want to wash my hands",      emoji:"🧼", bg:"#16A085"},
      {label:"Change",     phrase:"I want to change my clothes",  emoji:"👕", bg:"#148F77"},
    ]
  },
  {
    id:"go", label:"Go", emoji:"🚶", bg:"#2471A3",
    items:[
      {label:"Outside",    phrase:"I want to go outside",         emoji:"🌳", bg:"#1A5276"},
      {label:"Movie",      phrase:"I want to go for a movie",     emoji:"🎬", bg:"#1F618D"},
      {label:"Drive",      phrase:"I want to go for a drive",     emoji:"🚗", bg:"#2471A3"},
      {label:"Restaurant", phrase:"I want to go to a restaurant", emoji:"🍜", bg:"#2980B9"},
      {label:"Walk",       phrase:"I want to go for a walk",      emoji:"👟", bg:"#1A5276"},
    ]
  },
  {
    id:"play", label:"Play", emoji:"🎮", bg:"#E91E8C",
    items:[
      {label:"iPad",       phrase:"I want to use the iPad",    emoji:"📱", bg:"#C2185B"},
      {label:"Basketball", phrase:"I want to play basketball", emoji:"🏀", bg:"#D81B60"},
      {label:"Tennis",     phrase:"I want to play tennis",     emoji:"🎾", bg:"#AD1457"},
      {label:"Drums",      phrase:"I want to play drums",      emoji:"🥁", bg:"#880E4F"},
      {label:"Music",      phrase:"I want to listen to music", emoji:"🎵", bg:"#C2185B"},
      {label:"Walk",       phrase:"I want to go for a walk",   emoji:"👟", bg:"#D81B60"},
    ]
  },
  {
    id:"needs", label:"Needs", emoji:"🙋", bg:"#D4AC0D",
    items:[
      {label:"Stop",       phrase:"Please stop",             emoji:"🛑", bg:"#CC0000"},
      {label:"Break",      phrase:"I want a break please",   emoji:"😮‍💨", bg:"#D4AC0D"},
      {label:"Walk",       phrase:"I want to go for a walk", emoji:"👟", bg:"#B7950B"},
      {label:"Snack",      phrase:"I want a snack please",   emoji:"🍿", bg:"#CA8A04"},
      {label:"Water",      phrase:"I want water please",     emoji:"💧", bg:"#0284C7"},
      {label:"Call Mummy", phrase:"I want to call Mummy",    emoji:"📞", bg:"#16A34A"},
      {label:"Call Daddy", phrase:"I want to call Daddy",    emoji:"📱", bg:"#7C3AED"},
    ]
  },
];

let currentGroup = null;
let currentItem  = null;
let isSpeaking   = false;

// Build home grid
const homeGrid = document.getElementById("home-grid");
GROUPS.forEach(g => {
  const btn = document.createElement("button");
  btn.className = "tile";
  btn.style.background = g.bg;
  btn.style.boxShadow = `0 6px 18px ${g.bg}55`;
  btn.innerHTML = `<span class="tile-emoji">${g.emoji}</span><span class="tile-word">${g.label}</span>`;
  btn.onclick = () => openGroup(g);
  homeGrid.appendChild(btn);
});

function openGroup(g) {
  currentGroup = g;
  // Build group grid
  const grid = document.getElementById("group-grid");
  grid.innerHTML = "";
  g.items.forEach(it => {
    const btn = document.createElement("button");
    btn.className = "tile";
    btn.style.background = it.bg;
    btn.style.boxShadow = `0 5px 16px ${it.bg}55`;
    btn.innerHTML = `<span class="tile-emoji">${it.emoji}</span><span class="tile-word">${it.label}</span>`;
    btn.onclick = () => tapItem(it);
    grid.appendChild(btn);
  });
  // Update nav
  document.getElementById("nav").style.background = g.bg;
  document.getElementById("nav-title").textContent = g.label;
  document.getElementById("logo-box").classList.add("hidden");
  document.getElementById("back-btn").classList.remove("hidden");
  document.getElementById("x-btn").classList.remove("hidden");
  // Show group page
  document.getElementById("home-page").classList.add("hidden");
  document.getElementById("group-page").classList.remove("hidden");
  document.getElementById("speak-page").classList.add("hidden");
}

function tapItem(it) {
  currentItem = it;
  // Update nav
  document.getElementById("nav").style.background = it.bg;
  document.getElementById("nav-title").textContent = it.label;
  // Show speak page
  document.getElementById("home-page").classList.add("hidden");
  document.getElementById("group-page").classList.add("hidden");
  document.getElementById("speak-page").classList.remove("hidden");
  // Set content
  document.getElementById("speak-emoji-box").textContent = it.emoji;
  document.getElementById("phrase-text").textContent = `"${it.phrase}"`;
  document.getElementById("speak-page").style.background = `linear-gradient(170deg, ${it.bg} 0%, ${it.bg}bb 100%)`;
  doSpeak(it.phrase);
}

function sayAgain() {
  if (currentItem) doSpeak(currentItem.phrase);
}

function goBack() {
  stopSpeech();
  if (!document.getElementById("group-page").classList.contains("hidden")) {
    goHome();
  } else {
    // speaking → group
    document.getElementById("speak-page").classList.add("hidden");
    document.getElementById("group-page").classList.remove("hidden");
    document.getElementById("nav").style.background = currentGroup.bg;
    document.getElementById("nav-title").textContent = currentGroup.label;
  }
}

function goHome() {
  stopSpeech();
  currentGroup = null; currentItem = null;
  document.getElementById("nav").style.background = "#1a2d40";
  document.getElementById("nav-title").textContent = "Jay Speaks";
  document.getElementById("logo-box").classList.remove("hidden");
  document.getElementById("back-btn").classList.add("hidden");
  document.getElementById("x-btn").classList.add("hidden");
  document.getElementById("home-page").classList.remove("hidden");
  document.getElementById("group-page").classList.add("hidden");
  document.getElementById("speak-page").classList.add("hidden");
}

// ── iOS AUDIO UNLOCK ──
// iOS Safari blocks speech until a user gesture has occurred.
// We silently trigger a blank utterance on first tap to unlock it.
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  const u = new SpeechSynthesisUtterance("");
  u.volume = 0;
  window.speechSynthesis.speak(u);
  // Also pre-load voices
  window.speechSynthesis.getVoices();
}
document.addEventListener("touchstart", unlockAudio, { once: true });
document.addEventListener("click", unlockAudio, { once: true });
function stopSpeech() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  setSpeakingUI(false);
}

function setSpeakingUI(on) {
  isSpeaking = on;
  const box = document.getElementById("speak-emoji-box");
  const icon = document.getElementById("sound-icon");
  if (on) { box.classList.add("pulsing"); icon.style.display = "block"; }
  else     { box.classList.remove("pulsing"); icon.style.display = "none"; }
}

function getMaleVoice() {
  const voices = window.speechSynthesis.getVoices();
  const maleNames = ["Daniel","Alex","Fred","Ralph","Albert","Bruce","Junior",
    "Microsoft David","Google UK English Male","Aaron","Arthur","Gordon","Reed"];
  for (const name of maleNames) {
    const v = voices.find(v => v.name.includes(name) && v.lang.startsWith("en"));
    if (v) return v;
  }
  const femaleNames = ["Samantha","Victoria","Karen","Moira","Tessa","Allison",
    "Ava","Susan","Zoe","Google US English","Microsoft Zira","Microsoft Hazel"];
  const nonFemale = voices.find(v =>
    v.lang.startsWith("en") && !femaleNames.some(f => v.name.includes(f))
  );
  return nonFemale || voices.find(v => v.lang.startsWith("en")) || null;
}

function doSpeak(phrase) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(phrase);
  u.rate = 0.82; u.pitch = 0.9; u.volume = 1;
  u.onstart = () => setSpeakingUI(true);
  u.onend   = () => setSpeakingUI(false);
  u.onerror = () => setSpeakingUI(false);
  const trySpeak = () => {
    const v = getMaleVoice();
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  };
  if (window.speechSynthesis.getVoices().length === 0) {
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.onvoiceschanged = null;
      trySpeak();
    };
  } else {
    trySpeak();
  }
}
</script>
</body>
</html>
